services:
  caddy:
    image: caddy:2-alpine
    container_name: new-api-caddy
    restart: unless-stopped
    depends_on:
      new-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PUBLIC_HOST=${PUBLIC_HOST}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - new-api-network

  new-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: new-api
    restart: unless-stopped
    command: --log-dir /app/logs
    expose:
      - "3000"
    volumes:
      - app_data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@redis:6379/0
      - TZ=${TZ:-Asia/Shanghai}
      - SESSION_SECRET=${SESSION_SECRET}
      - CRYPTO_SECRET=${CRYPTO_SECRET}
      - TRUSTED_REDIRECT_DOMAINS=${TRUSTED_REDIRECT_DOMAINS}
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=${NODE_NAME:-new-api-prod-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -q '\"success\"[[:space:]]*:[[:space:]]*true'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - new-api-network

  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - new-api-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - new-api-network

volumes:
  app_data:
  caddy_config:
  caddy_data:
  pg_data:
  redis_data:

networks:
  new-api-network:
    driver: bridge
